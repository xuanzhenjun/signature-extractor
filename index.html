<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>签名背景去除工具 - 免费在线去除签名背景</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-checkered {
            background-image: 
                linear-gradient(45deg, #f5f5f5 25%, transparent 25%),
                linear-gradient(-45deg, #f5f5f5 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #f5f5f5 75%),
                linear-gradient(-45deg, transparent 75%, #f5f5f5 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
        }
        body {
            background: #fafafa;
        }
    </style>
</head>
<body class="min-h-screen" style="background:#fafafa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
    <!-- Header -->
    <header style="background:#fff; border-bottom:1px solid #ebebeb;">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6c47ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                <span style="font-size:16px; font-weight:600; color:#1a1a1a; letter-spacing:-0.3px;">签名背景去除</span>
            </div>
            <span style="font-size:13px; color:#888;">本地处理 · 隐私安全</span>
        </div>
    </header>

    <!-- Hero -->
    <section class="max-w-5xl mx-auto px-6 pt-14 pb-10 text-center">
        <h1 style="font-size:38px; font-weight:700; color:#1a1a1a; letter-spacing:-1px; line-height:1.2; margin-bottom:12px;">
            一键去除签名背景
        </h1>
        <p style="font-size:16px; color:#666; max-width:480px; margin:0 auto 32px;">
            上传签名图片，自动识别并去除白色背景，生成透明 PNG，完全免费
        </p>
    </section>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-6 pb-16">
        <!-- Features -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            <div style="background:#fff; border:1px solid #ebebeb; border-radius:10px; padding:20px 24px;">
                <div style="font-size:13px; font-weight:600; color:#1a1a1a; margin-bottom:4px;">即时处理</div>
                <div style="font-size:13px; color:#888;">无需等待，浏览器本地完成</div>
            </div>
            <div style="background:#fff; border:1px solid #ebebeb; border-radius:10px; padding:20px 24px;">
                <div style="font-size:13px; font-weight:600; color:#1a1a1a; margin-bottom:4px;">隐私保护</div>
                <div style="font-size:13px; color:#888;">图片不上传服务器</div>
            </div>
            <div style="background:#fff; border:1px solid #ebebeb; border-radius:10px; padding:20px 24px;">
                <div style="font-size:13px; font-weight:600; color:#1a1a1a; margin-bottom:4px;">完全免费</div>
                <div style="font-size:13px; color:#888;">无水印，无次数限制</div>
            </div>
        </div>

        <!-- Upload Area -->
        <div style="background:#fff; border:1px solid #ebebeb; border-radius:12px; padding:0; overflow:hidden; margin-bottom:24px;">
            <div id="dropZone" style="border:2px dashed #d4d4d4; border-radius:10px; margin:24px; padding:56px 24px; text-align:center; cursor:pointer; transition:all 0.2s;" 
                 onmouseover="this.style.borderColor='#6c47ff';this.style.background='#f9f7ff'" 
                 onmouseout="this.style.borderColor='#d4d4d4';this.style.background='transparent'">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 16px;display:block;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <p style="font-size:15px; font-weight:600; color:#1a1a1a; margin-bottom:6px;">拖拽图片到此处</p>
                <p style="font-size:13px; color:#999; margin-bottom:20px;">或点击选择文件 · 支持 JPG、PNG，最大 10MB</p>
                <button style="background:#6c47ff; color:#fff; border:none; padding:10px 28px; border-radius:6px; font-size:14px; font-weight:500; cursor:pointer; letter-spacing:0.2px;">选择图片</button>
                <input type="file" id="fileInput" accept="image/*" class="hidden">
            </div>
        </div>

        <!-- Processing Area -->
        <div id="processingArea" class="hidden">
            <div class="grid md:grid-cols-2 gap-5 mb-5">
                <!-- Original -->
                <div style="background:#fff; border:1px solid #ebebeb; border-radius:12px; overflow:hidden;">
                    <div style="padding:14px 20px; border-bottom:1px solid #f0f0f0;">
                        <span style="font-size:13px; font-weight:500; color:#666;">原图</span>
                    </div>
                    <div style="padding:20px;">
                        <canvas id="originalCanvas" style="width:100%; border:1px solid #f0f0f0; border-radius:6px; display:block;"></canvas>
                    </div>
                </div>

                <!-- Processed -->
                <div style="background:#fff; border:1px solid #ebebeb; border-radius:12px; overflow:hidden;">
                    <div style="padding:14px 20px; border-bottom:1px solid #f0f0f0; display:flex; align-items:center; gap:8px;">
                        <span style="font-size:13px; font-weight:500; color:#666;">处理后</span>
                        <span style="font-size:11px; background:#f0edff; color:#6c47ff; padding:2px 8px; border-radius:4px; font-weight:500;">透明背景</span>
                    </div>
                    <div style="padding:20px;">
                        <canvas id="processedCanvas" class="bg-checkered" style="width:100%; border:1px solid #f0f0f0; border-radius:6px; display:block;"></canvas>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div style="background:#fff; border:1px solid #ebebeb; border-radius:12px; padding:24px;">
                <div style="font-size:14px; font-weight:600; color:#1a1a1a; margin-bottom:16px;">调整参数</div>
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <label style="font-size:13px; color:#555;">背景去除强度</label>
                        <span id="thresholdValue" style="font-size:13px; font-weight:600; color:#6c47ff;">128</span>
                    </div>
                    <input type="range" id="threshold" min="0" max="255" value="128" 
                           class="w-full cursor-pointer" style="accent-color:#6c47ff;">
                    <div class="flex justify-between" style="font-size:11px; color:#bbb; margin-top:4px;">
                        <span>保留更多</span>
                        <span>去除更多</span>
                    </div>
                </div>
                
                <div class="flex gap-3">
                    <button id="downloadBtn" style="flex:1; background:#6c47ff; color:#fff; border:none; padding:12px 24px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; letter-spacing:0.2px;">
                        下载透明背景图片
                    </button>
                    <button id="resetBtn" style="padding:12px 20px; border:1px solid #e0e0e0; background:#fff; border-radius:8px; font-size:14px; color:#555; cursor:pointer; font-weight:500;">
                        重新上传
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer style="border-top:1px solid #ebebeb; background:#fff;">
        <div class="max-w-5xl mx-auto px-6 py-6 text-center">
            <p style="font-size:13px; color:#999;">所有图片处理均在浏览器本地完成，不会上传到任何服务器</p>
            <p style="font-size:12px; color:#bbb; margin-top:6px;">© 2024 签名背景去除工具</p>

    <script src="app.js"></script>

</html>
