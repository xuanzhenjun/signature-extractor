<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>签名背景去除工具 - 免费在线去除签名背景</title>
    <meta name="description" content="免费在线去除签名背景，一键生成透明背景签名图片，支持PNG导出">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <h1 class="text-2xl font-bold text-gray-900">签名背景去除</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Upload Area -->
        <div class="bg-white rounded-lg shadow-md p-8 mb-8">
            <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-lg p-12 text-center hover:border-blue-500 transition cursor-pointer">
                <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                    <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <p class="mt-4 text-lg text-gray-600">点击或拖拽上传签名图片</p>
                <p class="mt-2 text-sm text-gray-500">支持 JPG、PNG 格式</p>
                <input type="file" id="fileInput" accept="image/*" class="hidden">
            </div>
        </div>

        <!-- Processing Area -->
        <div id="processingArea" class="hidden">
            <div class="grid md:grid-cols-2 gap-8">
                <!-- Original Image -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-lg font-semibold mb-4">原图</h2>
                    <canvas id="originalCanvas" class="w-full border border-gray-200 rounded"></canvas>
                </div>

                <!-- Processed Image -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h2 class="text-lg font-semibold mb-4">处理后</h2>
                    <canvas id="processedCanvas" class="w-full border border-gray-200 rounded bg-checkered"></canvas>
                </div>
            </div>

            <!-- Controls -->
            <div class="bg-white rounded-lg shadow-md p-6 mt-8">
                <h3 class="text-lg font-semibold mb-4">调整参数</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            阈值 (越小越严格): <span id="thresholdValue">128</span>
                        </label>
                        <input type="range" id="threshold" min="0" max="255" value="128" class="w-full">
                    </div>
                </div>
                <div class="mt-6 flex gap-4">
                    <button id="downloadBtn" class="flex-1 bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition font-medium">
                        下载透明背景图片
                    </button>
                    <button id="resetBtn" class="px-6 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                        重新上传
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t mt-16">
        <div class="max-w-6xl mx-auto px-4 py-6 text-center text-gray-600 text-sm">
            <p>© 2024 签名背景去除工具 | 完全免费 | 浏览器本地处理，保护隐私</p>
        </div>
    </footer>

    <style>
        .bg-checkered {
            background-image: 
                linear-gradient(45deg, #f0f0f0 25%, transparent 25%),
                linear-gradient(-45deg, #f0f0f0 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #f0f0f0 75%),
                linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>

    <script src="app.js"></script>
</body>
</html>
